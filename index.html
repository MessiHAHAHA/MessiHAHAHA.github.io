.sr-only {

  color: var(--primary-foreground);

  cursor: var(--cursor-interaction, default);

.form-check:not(.form-switch) .form-check-input[type=&quot;checkbox&quot;] {
  border-color: var(--input);
  border-radius: var(--radius-sm);

  background-color: var(--secondary);

  height: 20px;

  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

html&gt;body{padding:0}&lt;/style&gt;

&lt;body&gt;
&lt;div id=&quot;brainEitLab&quot; class=&quot;eit-lab&quot;&gt;

      &lt;/label&gt;

          &lt;input class=&quot;form-range&quot; id=&quot;lesionX&quot; type=&quot;range&quot; min=&quot;-50&quot; max=&quot;50&quot; step=&quot;1&quot; value=&quot;-25&quot;&gt;
        &lt;/label&gt;
        &lt;label class=&quot;form-label&quot; for=&quot;lesionY&quot;&gt;前后 Y &lt;output id=&quot;lesionYValue&quot;&gt;8 mm&lt;/output&gt;

    &lt;/section&gt;

        &lt;canvas id=&quot;brainCanvas&quot; role=&quot;img&quot; aria-label=&quot;可旋转的三维头部、双侧大脑皮层、脑沟脑回、脑膜、病灶与电极模型&quot;&gt;&lt;/canvas&gt;

&lt;style&gt;

&lt;script&gt;
(() =&gt; {
  const root = document.getElementById(&#x27;brainEitLab&#x27;);
  const brainCanvas = root.querySelector(&#x27;#brainCanvas&#x27;);
  const voltageCanvas = root.querySelector(&#x27;#voltageCanvas&#x27;);
  const reconCanvas = root.querySelector(&#x27;#reconCanvas&#x27;);
  const ctx = brainCanvas.getContext(&#x27;2d&#x27;);
  const vctx = voltageCanvas.getContext(&#x27;2d&#x27;);
  const rctx = reconCanvas.getContext(&#x27;2d&#x27;);
  const state = { yaw: -0.55, pitch: 0.2, zoom: 1, dragging: false, px: 0, py: 0, run: 0, result: null };
  const ids = [&#x27;contrast&#x27;, &#x27;lesionX&#x27;, &#x27;lesionY&#x27;, &#x27;lesionZ&#x27;, &#x27;radius&#x27;, &#x27;electrodeCount&#x27;, &#x27;current&#x27;, &#x27;heart&#x27;, &#x27;resp&#x27;, &#x27;noise&#x27;, &#x27;lambda&#x27;];
  const outputs = {
    contrast: v =&gt; `${v &lt; 0 ? &#x27;−&#x27; : &#x27;+&#x27;}${Math.abs(v)}%`,
    lesionX: v =&gt; `${v &lt; 0 ? &#x27;−&#x27; : &#x27;&#x27;}${Math.abs(v)} mm`,
    lesionY: v =&gt; `${v &lt; 0 ? &#x27;−&#x27; : &#x27;&#x27;}${Math.abs(v)} mm`,
    lesionZ: v =&gt; `${v &lt; 0 ? &#x27;−&#x27; : &#x27;&#x27;}${Math.abs(v)} mm`,
    radius: v =&gt; `${v} mm`, electrodeCount: v =&gt; `${v}`, current: v =&gt; `${v} µA`,
    heart: v =&gt; `${v}%`, resp: v =&gt; `${v}%`, noise: v =&gt; `${v}%`, lambda: v =&gt; `${(v / 100).toFixed(2)}`
  };

  // Canvas does not consistently accept unresolved modern CSS functions such
  // as light-dark() and color-mix(). Resolve each theme token through a real
  // element first so the drawing contexts always receive a concrete rgb/rgba
  // color instead of silently falling back to black.
  const colorProbe = document.createElement(&#x27;span&#x27;);
  colorProbe.setAttribute(&#x27;aria-hidden&#x27;, &#x27;true&#x27;);
  colorProbe.style.cssText = &#x27;position:absolute;visibility:hidden;pointer-events:none&#x27;;
  root.appendChild(colorProbe);
  function css(name) {
    colorProbe.style.color = `var(${name})`;
    return getComputedStyle(colorProbe).color;
  }
  function sizeCanvas(canvas, context) {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = canvas.getBoundingClientRect();
    const w = Math.max(2, Math.round(rect.width * dpr));
    const h = Math.max(2, Math.round(rect.height * dpr));
    if (canvas.width !== w || canvas.height !== h) { canvas.width = w; canvas.height = h; }
    context.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { w: rect.width, h: rect.height };
  }
  function params() {
    return {
      type: root.querySelector(&#x27;#lesionType&#x27;).value,
      contrast: +root.querySelector(&#x27;#contrast&#x27;).value / 100,
      x: +root.querySelector(&#x27;#lesionX&#x27;).value,
      y: +root.querySelector(&#x27;#lesionY&#x27;).value,
      z: +root.querySelector(&#x27;#lesionZ&#x27;).value,
      radius: +root.querySelector(&#x27;#radius&#x27;).value,
      n: +root.querySelector(&#x27;#electrodeCount&#x27;).value,
      current: +root.querySelector(&#x27;#current&#x27;).value,
      pattern: root.querySelector(&#x27;#drivePattern&#x27;).value,
      heart: +root.querySelector(&#x27;#heart&#x27;).value / 100,
      resp: +root.querySelector(&#x27;#resp&#x27;).value / 100,
      noise: +root.querySelector(&#x27;#noise&#x27;).value / 100,
      lambda: +root.querySelector(&#x27;#lambda&#x27;).value / 100,
      correction: root.querySelector(&#x27;#physCorrection&#x27;).checked
    };
  }
  function rotate(p) {
    const cy = Math.cos(state.yaw), sy = Math.sin(state.yaw);
    const cp = Math.cos(state.pitch), sp = Math.sin(state.pitch);
    const x1 = p.x * cy - p.y * sy;
    const y1 = p.x * sy + p.y * cy;
    return { x: x1, y: p.z * cp - y1 * sp, d: y1 * cp + p.z * sp };
  }
  function project(p, w, h) {
    const q = rotate(p); const scale = Math.min(w / 235, h / 220) * state.zoom;
    const perspective = 1 + q.d / 700;

    window.crypto?.randomUUID?.() ?? Date.now().toString(36)

  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;

    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;

    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);

  };

    })
      .then(({ x, y }) =&gt; {

        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;

  const openTooltip = (trigger) =&gt; {
